<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment | Forex Global</title>
    <style>
        body { background: #0b132b; color: white; font-family: sans-serif; padding: 20px; }
        .payment-box { background: #1c2541; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
        .number-box { background: #0d6efd; padding: 10px; margin: 5px 0; border-radius: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin: 15px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #00f2fe; color: #0b132b; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<div class="payment-box">
    <h2 style="text-align:center;">Send Payment</h2>
    <p>Please send money to any of the numbers below:</p>
    <div class="number-box">Bkash: 01727-469215</div>
    <div class="number-box">Nagad: 01600787628</div>
    <div class="number-box">Rocket: 01600787628</div>
    
    <input type="text" id="txid" placeholder="Enter Transaction ID (TxID)" required>
    <button onclick="submitPayment()">Submit Payment Request</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>

<script>
    // আপনার ফায়ারবেস কনফিগারেশন
    const firebaseConfig = {
        apiKey: "AIzaSyBKgUEN3eCEQIm07JejOr4kM0yOBEGGdR8",
        authDomain: "forexglobal-95dfc.firebaseapp.com",
        projectId: "forexglobal-95dfc",
        storageBucket: "forexglobal-95dfc.firebasestorage.app",
        messagingSenderId: "87470977908",
        appId: "1:87470977908:web:4b7f316b372327ffa87221"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    async function submitPayment() {
        const txid = document.getElementById('txid').value;
        const user = auth.currentUser;
        
        if(!txid) { alert("Please enter Transaction ID"); return; }
        if(!user) { alert("Please login first"); return; }

        try {
            await db.collection("pending_payments").add({
                uid: user.uid,
                email: user.email,
                txid: txid,
                amount: 500, // এখানে আপনার প্ল্যান অনুযায়ী অ্যামাউন্ট পরিবর্তন করে নেবেন
                status: "pending",
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Payment Request Submitted! Waiting for admin approval.");
            document.getElementById('txid').value = ""; // ফর্ম খালি করার জন্য
        } catch (error) {
            alert("Error: " + error.message);
        }
    }
</script>
</body>
</html>
