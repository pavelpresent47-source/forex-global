<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw | Forex Global</title>
    <style>
        body { background: #0b132b; color: white; font-family: sans-serif; padding: 20px; display: flex; justify-content: center; }
        .withdraw-card { background: #1c2541; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; border: 1px solid #00f2fe; }
        .balance-info { text-align: center; font-size: 1.2rem; margin-bottom: 20px; color: #00f2fe; font-weight: bold; }
        
        .method-container { display: flex; justify-content: center; gap: 10px; margin: 15px 0; }
        .method-btn { padding: 10px 15px; border: 2px solid #3a506b; background: #0b132b; color: white; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        
        /* এখানে মেইন লজিক: যখন 'active' ক্লাস যুক্ত হবে, তখন কালার পরিবর্তন হবে */
        .method-btn.bKash.active { border-color: #e91e63; background: #e91e63 !important; }
        .method-btn.Nagad.active { border-color: #f44336; background: #f44336 !important; }
        .method-btn.Rocket.active { border-color: #9c27b0; background: #9c27b0 !important; }

        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #3a506b; background: #0b132b; color: white; box-sizing: border-box; }
        button.submit-btn { width: 100%; padding: 14px; background: linear-gradient(45deg, #0d6efd, #00f2fe); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="withdraw-card">
    <div class="balance-info" id="userBalance">Loading Balance...</div>
    
    <label>Select Payment Method:</label>
    <div class="method-container">
        <!-- এখানে বাটনগুলোতে ক্লাসগুলো ঠিকভাবে দেওয়া হয়েছে -->
        <button class="method-btn bKash" onclick="setMethod('bKash', this)">bKash</button>
        <button class="method-btn Nagad" onclick="setMethod('Nagad', this)">Nagad</button>
        <button class="method-btn Rocket" onclick="setMethod('Rocket', this)">Rocket</button>
    </div>

    <input type="number" id="wAmount" placeholder="Amount to Withdraw">
    <input type="text" id="wNumber" placeholder="Enter your number">
    <button class="submit-btn" onclick="requestWithdraw()">Submit Withdraw Request</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>

<script>
    // আপনার কনফিগারেশন কোডটি এখানে বসান
    const firebaseConfig = { /* ... */ };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let selectedMethod = "";

    function setMethod(method, btn) {
        selectedMethod = method;
        // সব বাটন থেকে 'active' ক্লাস সরিয়ে দেওয়া হচ্ছে
        document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
        // ক্লিক করা বাটনে 'active' ক্লাস যুক্ত করা হচ্ছে
        btn.classList.add('active');
    }
    
    // বাকি জাভাস্ক্রিপ্ট লজিক আগের মতোই...
</script>
</body>
</html>
